[project]
name = "codealive-mcp"
dynamic = ["version"]
description = "MCP server for the CodeAlive API"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastmcp==2.14.4",
    "httpx==0.28.1",
    "python-dotenv==1.2.1",
]

[project.optional-dependencies]
test = [
    "pytest==9.0.2",
    "pytest-asyncio==1.3.0",
    "pytest-mock==3.15.1",
    "pytest-cov==7.1.0",
    "mcp==1.26.0",
]

[project.scripts]
codealive-mcp = "codealive_mcp.server:main"

[build-system]
requires = ["setuptools==82.0.1", "setuptools-scm==10.0.1"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["src"]
package-dir = {"" = "."}

[tool.setuptools_scm]

[tool.uv]
required-version = "==0.11.2"
exclude-newer = "7 days"
